@let current = column();

<div class="Column">


  @if (current) {
    <div>{{ column()?.title }}</div>
  }

  <div class="CardList">
    @for (card of current?.tickets; track $index) {
      <cp-card [card]="card" (moveLeft)="onCardRequestMoveLeft(card.id)" (moveRight)="onCardRequestMoveRight(card.id)"
               (clickOnDelete)="onCardRequestDelete(card.id)"></cp-card>
    }
  </div>


</div>
