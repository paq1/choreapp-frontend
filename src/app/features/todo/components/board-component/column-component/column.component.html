@let current = column();

<div class="Column">
  <span>TITLE column: </span>
  @if (current) {
    <span>{{ column()?.title }} </span>
  }

  <div class="CardList">
    @for (card of current?.tickets; track $index) {
      <cp-card [card]="card" (moveLeft)="onCardRequestMoveLeft(card.id)" (moveRight)="onCardRequestMoveRight(card.id)"></cp-card>
    }
  </div>
</div>
