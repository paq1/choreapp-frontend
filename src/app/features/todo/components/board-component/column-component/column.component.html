@let current = column();

<div class="Column" cdkDropList (cdkDropListDropped)="drop($event)">


  @if (current) {
    <span style="font-size: 20px"><b>{{ column()?.title }}</b></span>
  }

  <div class="CardList">
    @for (card of current?.tickets; track $index) {
      <cp-card [card]="card" (moveLeft)="onCardRequestMoveLeft(card.id)" (moveRight)="onCardRequestMoveRight(card.id)"
               (clickOnDelete)="onCardRequestDelete(card.id)" (currentDragStart)="onCardDragStart($event)"></cp-card>
    }
  </div>


</div>
