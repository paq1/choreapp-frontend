    <button style="border-radius: 6px" (click)="onDelete()">x</button>
  </div>
  <div style="display: flex; flex-direction: column; gap: 2px">
    <span>title : {{ card()?.title }}</span>
    <span>description : {{ card()?.description }}</span>
  </div>
  <div>
    <button (click)="onMoveLeft()"><<</button>
    <button (click)="onMoveRight()">>></button>
  </div>
</div>
